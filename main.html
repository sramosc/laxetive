<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oliver Laxe diario</title>
    <style>
      body {
        margin: 0;
        font-family: Georgia, serif;
        background-color: #f4f4f4;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      .container {
        background: white;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        max-width: 600px;
        text-align: center;
      }

      h1 {
        margin-bottom: 30px;
        font-weight: normal;
      }

      p {
        font-size: 1.2rem;
        line-height: 1.6;
        min-height: 60px;
        transition: opacity 0.3s ease;
      }

      button {
        margin-top: 20px;
        padding: 10px 20px;
        font-size: 1rem;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        background-color: #222;
        color: white;
        transition: background 0.3s ease;
      }

      button:hover {
        background-color: #444;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Oliver Laxe diario</h1>
      <p id="frase"></p>
      <button onclick="generarFrase()">Generar nueva frase</button>
    </div>
    <script>
      const palabras1 = [
        "la resiliencia",
        "la inmanencia",
        "la laxitud",
        "la paz interior",
        "ligereza",
        "el pan con masa madre",
        "las cocretas",
        "la otredad",
        "el nihilismo",
      ];

      const palabras2 = [
        "la concupiscencia carnal",
        "la relatividad de lo eterno",
        "la senectud de los valores",
        "la asunción de lo oceánico",
        "el malabarismo de la emoción cruda",
        "la masa abotargada de las ideas",
        "la conjunción de lo sublime y lo ridículo",
        "la aquiescencia de lo absurdo",
        "la melancolía",
        "la cola del mercadona",
        "la efervescencia de lo epatante",
        "la conjetura de los días de lluvia",
      ];

      const inicios = [
        "Hoy comprendo que",
        "A veces siento que",
        "En medio del ruido descubro que",
        "Mientras amaso pensamientos como",
        "Con cierta ligereza admito que",
        "Entre la laxitud del domingo pienso que",
        "Cuando dialogo con el silencio me doy cuenta de que",
        "En la evanescencia de lo cotidiano encuentro que",
        "Al observar el mundo con estupor benevolente, veo que",
        "En la calma de la mañana, me doy cuenta de que",
        "En la quietud de la noche, comprendo que",
        "En la simplicidad de lo cotidiano, descubro que",
        "En la fragilidad de lo efímero, encuentro que",
        "En la profundidad de lo banal, me doy cuenta de que",
        "En la ligereza de lo cotidiano, comprendo que",
        "En la calma de lo efímero, descubro que",
        "En la serenidad de lo banal, encuentro que",
        "En la fragilidad de lo cotidiano, me doy cuenta de que",
        "En la profundidad de lo efímero, comprendo que",
        "En la ligereza de lo banal, descubro que",
      ];

      const conectores = [
        "es una forma de",
        "dialoga con",
        "se diluye en",
        "fermenta como",
        "abraza la",
        "cuestiona el",
        "se entrelaza con",
        "se funde con",
        "se contrapone a",
        "se asocia con",
        "se refleja en",
        "se opone a",
        "se complementa con",
        "se confunde con",
      ];

      function generarFrase() {
        const inicio = inicios[Math.floor(Math.random() * inicios.length)];
        const palabra1 = palabras1[Math.floor(Math.random() * palabras1.length)];
        const conector =
          conectores[Math.floor(Math.random() * conectores.length)];
        const palabra2 = palabras2[Math.floor(Math.random() * palabras2.length)];

        const frase = `${inicio} ${palabra1} ${conector} ${palabra2}.`;
        const elemento = document.getElementById("frase");
        elemento.style.opacity = 0;
        setTimeout(() => {
          elemento.textContent = frase;
          elemento.style.opacity = 1;
        }, 150);
      }

      generarFrase();
    </script>
  </body>
</html>
